services:
  openclaw-gateway:
    container_name: openclaw_gateway
    image: openclaw:custom
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}

  openclaw-cli:
    container_name: openclaw_cli
    image: openclaw:custom
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}

  # Nginx is managed by the genius (infra) repo
  # Ollama is managed by the genius (infra) repo

networks:
  default:
    name: shared_infra
    external: true

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-openclaw
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          HOST=$(echo "$SSH_HOST" | cut -d':' -f1)
          PORT=$(echo "$SSH_HOST" | grep -o ':[0-9]*' | cut -d':' -f2 || echo "22")
          ssh-keyscan -H -p $PORT $HOST >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHP_TOKEN: ${{ secrets.GHP_TOKEN }}
          OPENCLAW_SERVER_NAME: ${{ secrets.OPENCLAW_SERVER_NAME }}
        run: |
          HOST=$(echo $SSH_HOST | cut -d':' -f1)
          PORT=$(echo $SSH_HOST | grep -o ':[0-9]*' | cut -d':' -f2 || echo "22")

          # Create env file
          {
            echo "export DEPLOY_PATH='${DEPLOY_PATH}'"
            echo "export GHP_TOKEN='${GHP_TOKEN}'"
            echo "export OPENCLAW_SERVER_NAME='${OPENCLAW_SERVER_NAME}'"
          } > /tmp/env_vars.sh

          # Transfer env + deploy script
          scp -P $PORT /tmp/env_vars.sh $SSH_USER@$HOST:/tmp/env_vars.sh
          scp -P $PORT scripts/deploy.sh $SSH_USER@$HOST:/tmp/deploy_openclaw.sh

          # Execute
          ssh -p $PORT $SSH_USER@$HOST "chmod 600 /tmp/env_vars.sh && source /tmp/env_vars.sh && bash /tmp/deploy_openclaw.sh; EXIT_CODE=\$?; rm -f /tmp/deploy_openclaw.sh /tmp/env_vars.sh; exit \$EXIT_CODE"

          rm -f /tmp/env_vars.sh

      - name: Health check
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          HOST=$(echo $SSH_HOST | cut -d':' -f1)
          PORT=$(echo $SSH_HOST | grep -o ':[0-9]*' | cut -d':' -f2 || echo "22")

          echo "Running health check..."
          sleep 5
          if ssh -p $PORT $SSH_USER@$HOST "curl -f -s -o /dev/null http://localhost:18780/"; then
            echo "Health check passed!"
          else
            echo "Health check failed (may need auth), checking containers..."
            ssh -p $PORT $SSH_USER@$HOST "docker ps --filter name=openclaw"
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment completed successfully!"
          else
            echo "Deployment failed! Check the logs for more information."
          fi
